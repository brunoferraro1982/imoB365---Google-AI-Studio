name: CD — Deploy Cloudflare Workers

on:
  push:
    branches:
      - main # → produção
      - develop # → staging

  # Deploy manual via workflow_dispatch (útil para rollback ou hotfix)
  workflow_dispatch:
    inputs:
      environment:
        description: "Ambiente de deploy"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false # não cancelar deploys em andamento

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1: Deploy para Staging (branch develop)
  # ─────────────────────────────────────────────────────────────
  deploy-staging:
    name: 🚀 Deploy → Staging
    runs-on: ubuntu-latest
    environment: staging
    if: |
      (github.ref == 'refs/heads/develop') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    env:
      SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
      SUPABASE_PUBLISHABLE_KEY: ${{ secrets.STAGING_SUPABASE_PUBLISHABLE_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.STAGING_SUPABASE_SERVICE_ROLE_KEY }}
      VITE_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.STAGING_SUPABASE_PUBLISHABLE_KEY }}
      VITE_SUPABASE_PROJECT_ID: ${{ secrets.STAGING_SUPABASE_PROJECT_ID }}
      GEMINI_API_KEY: ${{ secrets.STAGING_GEMINI_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy para Cloudflare Workers (staging)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env staging
          secrets: |
            SUPABASE_URL
            SUPABASE_PUBLISHABLE_KEY
            SUPABASE_SERVICE_ROLE_KEY
            GEMINI_API_KEY

      - name: Notificar deploy de staging
        if: success()
        run: |
          echo "✅ Deploy de staging concluído — commit ${{ github.sha }}"
          echo "🔗 URL: https://imob365-staging.workers.dev"

  # ─────────────────────────────────────────────────────────────
  # JOB 2: Deploy para Produção (branch main)
  # ─────────────────────────────────────────────────────────────
  deploy-production:
    name: 🚀 Deploy → Produção
    runs-on: ubuntu-latest
    environment: production # requer aprovação manual configurada no GitHub
    if: |
      (github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    env:
      SUPABASE_URL: ${{ secrets.PROD_SUPABASE_URL }}
      SUPABASE_PUBLISHABLE_KEY: ${{ secrets.PROD_SUPABASE_PUBLISHABLE_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.PROD_SUPABASE_SERVICE_ROLE_KEY }}
      VITE_SUPABASE_URL: ${{ secrets.PROD_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.PROD_SUPABASE_PUBLISHABLE_KEY }}
      VITE_SUPABASE_PROJECT_ID: ${{ secrets.PROD_SUPABASE_PROJECT_ID }}
      GEMINI_API_KEY: ${{ secrets.PROD_GEMINI_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build de produção
        run: npm run build

      - name: Deploy para Cloudflare Workers (produção)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env production
          secrets: |
            SUPABASE_URL
            SUPABASE_PUBLISHABLE_KEY
            SUPABASE_SERVICE_ROLE_KEY
            GEMINI_API_KEY

      - name: Criar tag de release
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TAG="deploy-$(date +'%Y%m%d-%H%M%S')-${GITHUB_SHA::7}"
          git tag "$TAG"
          git push origin "$TAG"
          echo "🏷️ Tag criada: $TAG"

      - name: Notificar deploy de produção
        if: success()
        run: |
          echo "✅ Deploy de produção concluído — commit ${{ github.sha }}"
          echo "🔗 URL: https://imob365.workers.dev"
